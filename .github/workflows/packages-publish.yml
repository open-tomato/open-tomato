# DISABLED: enable after npm org registry is configured.
# See plans/refactor/01-packages.md §01.6 (in the open-tomato repo).
#
# To enable:
#   1. Uncomment the `on:` block below.
#   2. Add an NPM_TOKEN repo secret with publish rights for the @open-tomato org.
#   3. Remove --dry-run from the bun publish steps when ready to actually publish.

name: packages-publish

# on:
#   push:
#     tags:
#       - 'v*'

# Workflow never runs until the `on:` block above is uncommented.
# The job body is kept here so the pipeline is reviewable in PRs.

on: []

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Dry-run publish (shared)
        run: bun publish --dry-run --access public --cwd ./shared

      - name: Dry-run publish (service)
        run: bun publish --dry-run --access public --cwd ./service

      - name: Dry-run publish (notifications)
        run: bun publish --dry-run --access public --cwd ./notifications
