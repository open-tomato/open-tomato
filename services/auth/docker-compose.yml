# Local dev only — starts the auth service's Postgres + Redis dependencies.
# Run the auth service itself via `bun dev`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5435:5432"     # offset to avoid clashing with other local Postgres instances
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - auth_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"     # offset to avoid clashing with other local Redis instances
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - auth_redis_data:/data

volumes:
  auth_pg_data:
  auth_redis_data:
