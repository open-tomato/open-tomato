# Dev-loop constellation for the open-tomato monorepo.
#
# Services are intentionally commented out until Plan 03 migrates each one.
# Uncomment a stanza after its service is wired up and its `.env` exists.
#
# Run with:  bun run dev:stack

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: open_tomato
      POSTGRES_PASSWORD: open_tomato
      POSTGRES_DB: open_tomato
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_tomato -d open_tomato"]
      interval: 5s
      timeout: 3s
      retries: 20

  # app:
  #   build:
  #     context: .
  #     dockerfile: app/Dockerfile
  #   working_dir: /workspace/app
  #   command: bun run dev --host 0.0.0.0
  #   env_file: ./app/.env
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./:/workspace
  #     - /workspace/node_modules

  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    working_dir: /workspace/services/notifications
    command: bun run dev
    env_file: ./services/notifications/.env
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    working_dir: /workspace/services/orchestrator
    command: bun run dev
    env_file: ./services/orchestrator/.env
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    working_dir: /workspace/services/scheduler
    command: bun run dev
    env_file: ./services/scheduler/.env
    ports:
      - "3003:3000"
    depends_on:
      postgres:
        condition: service_healthy

  task-worker:
    build:
      context: .
      dockerfile: services/task-worker/Dockerfile
    working_dir: /workspace/services/task-worker
    command: bun run dev
    env_file: ./services/task-worker/.env
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------
  # External services (live in sibling umbrella folders, not this
  # monorepo). Uncomment to join them to the dev-loop constellation.
  # See README.md § "External services" and ../README.md for the
  # umbrella layout.
  # ---------------------------------------------------------------------

